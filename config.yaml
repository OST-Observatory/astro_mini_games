# Astro-Launcher Konfiguration

launcher:
  title: "Astro Explorer"

  # Ziel-Display (Pi)
  target_resolution: [2560, 1440]

  # Grid-Layout
  grid:
    cols: 3
    rows: 2
    padding: 60
    spacing: 40

  # NEU: Wackel-Einstellungen
  wiggle:
    enabled: true
    min_interval: 5 # Minimum Sekunden zwischen Wackeln
    max_interval: 12 # Maximum Sekunden zwischen Wackeln

  # Hintergrund-Einstellungen
  background:
    star_count: 200
    star_size_range: [1, 3]
    drift_stars: 50
    drift_speed: 15
    twinkle_enabled: true
    twinkle_speed: 2.0

    shooting_stars:
      enabled: true
      interval_range: [8, 20]
      duration: 0.8

    nebula:
      enabled: true
      mode: "original" # "original" = eure Bilder, "tinted" = eingefärbte Wolken
      opacity: 0.5 # 0.3-0.7 empfohlen für Fotos
      count: 3 # Anzahl gleichzeitig sichtbarer Nebel
      size: 0.4 # NEU: Größenfaktor (0.3 = klein, 0.6 = groß)
      speed: 1.5 # NEU: Geschwindigkeit (1.0 = normal, 2.0 = schnell)

apps:
