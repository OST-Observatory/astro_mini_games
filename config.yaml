# Astro Launcher configuration

inactivity:
  enabled: true
  timeout_sec: 180
  warning_sec: 10

launcher:
  use_wrapper: false

  grid:
    cols: 3

  wiggle:
    min_interval: 5
    max_interval: 12

  background:
    star_count: 200
    drift_stars: 50
    drift_speed: 15
    twinkle_enabled: true

    shooting_stars:
      enabled: true
      interval_range: [8, 20]

    nebula:
      enabled: true
      mode: "original"
      opacity: 0.5 # 0.3-0.7 recommended for photos
      count: 3 # Number of nebula visible at once
      size: 0.4 # Size factor (0.3 = small, 0.6 = large)
      speed: 1.5 # Speed (1.0 = normal, 2.0 = fast)

apps:
  # Demo app first for testing
  - id: demo
    name: "Demo App"
    icon: ">"
    command: "python apps/demo/main.py"
    description: "Test des Launch-Mechanismus"
    color: "#2e7d32"
    enabled: false

  - id: quiz
    name: "Astro-Quiz"
    icon: "?"
    command: "python apps/quiz/main.py"
    description: "Teste dein Wissen"
    color: "#006064"
    enabled: true

  - id: sonnensystem
    name: "Sonnensystem"
    icon: "md:public"
    command: "python apps/sonnensystem/main.py"
    description: "Reise durch unser Sonnensystem"
    color: "#4a148c"
    enabled: true

  - id: mondphasen
    name: "Mondphasen"
    icon: "md:nights_stay"
    command: "python apps/demo/main.py"
    description: "Placeholder"
    color: "#37474f"
    enabled: true

  - id: sternbilder
    name: "Sternbilder"
    icon: "md:stars"
    command: "python apps/sternbilder/main.py"
    description: "Entdecke und erkenne Sternbilder"
    color: "#1b5e20"
    enabled: true

  - id: galaxy_collision
    name: "Galaxien-Kollision"
    icon: "md:hub"
    command: "python apps/galaxy_collision/main.py"
    description: "Simulation verschmelzender Galaxien"
    color: "#1a237e"
    enabled: true

  - id: starlink_tracker
    name: "StarLink Tracker"
    icon: "md:satellite_alt"
    command: "python apps/demo/main.py"
    description: "Placeholder"
    color: "#37474f"
    enabled: true

  - id: hr_diagramm
    name: "HR-Diagramm"
    icon: "md:scatter_plot"
    command: "python apps/hr_diagramm/main.py"
