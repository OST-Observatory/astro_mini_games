# Default launcher configuration (versioned in the repo).
# For production, copy to config.yaml and adjust; config.yaml overrides this file when present.

i18n:
  locale: de  # de | en | es — user changes are saved to config.yaml

inactivity:
  # Disable for local testing: run app with --no-idle-timeout or ASTRO_NO_IDLE_TIMEOUT=1
  enabled: true
  timeout_sec: 180
  warning_sec: 10

launcher:
  use_wrapper: false

  grid:
    cols: 3

  wiggle:
    min_interval: 5
    max_interval: 12

  background:
    fps: 30  # Update rate (30 = lower CPU, 60 = smoother)
    star_count: 200
    drift_stars: 50
    drift_speed: 15
    twinkle_enabled: true

    shooting_stars:
      enabled: true
      interval_range: [8, 20]

    nebula:
      enabled: true
      mode: "original"
      opacity: 0.5 # 0.3-0.7 recommended for photos
      count: 3 # Number of nebula visible at once
      size: 0.4 # Size factor (0.3 = small, 0.6 = large)
      speed: 1.5 # Speed (1.0 = normal, 2.0 = fast)

apps:
  - id: demo
    name:
      de: "Demo-App"
      en: "Demo app"
      es: "App demo"
    icon: ">"
    command: "python apps/demo/main.py"
    description:
      de: "Test des Launch-Mechanismus"
      en: "Tests the launch mechanism"
      es: "Prueba el mecanismo de lanzamiento"
    color: "#2e7d32"
    enabled: false

  - id: quiz
    name:
      de: "Astro-Quiz"
      en: "Astro Quiz"
      es: "Astro cuestionario"
    icon: "?"
    command: "python apps/quiz/main.py"
