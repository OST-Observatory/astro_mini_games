- id: q40
  text: What are Jupiter Trojans?
  answers:
  - Asteroids that orbit the Sun in the same orbit as Jupiter, but precede or follow
    it at Lagrange points L4 and L5 with an average distance of 60°
  - Asteroids that orbit the Sun in the same orbit as Jupiter, but lead or follow
    it at an average distance of 45° from Lagrange points L2 and L3
  - Asteroids that orbit the Sun in the same orbit as Jupiter, but lead or follow
    it at an average distance of 75° from Lagrange points L4 and L5
  - Asteroids that orbit the Sun in the same orbit as Jupiter, but precede or follow
    it at Lagrange points L5 and L6 with an average distance of 50°
  correct: 0
  category: himmelsmechanik
  difficulty: astronom
  image: data/images/Orbita_aquiles.jpg
  image_credit: Fer31416, CC BY-SA 4.0, via Wikimedia Commons
